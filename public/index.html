<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>ABRAPA Bale HVI Results</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0d6efd">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="/icons/icon.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Tabulator -->
    <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        #columnManager {
            max-height: 500px;
            overflow-y: auto;
        }

        #columnManager details {
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #fff;
            overflow: hidden;
        }

        #columnManager summary {
            list-style: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f8f9fa;
            margin: 0;
        }

        #columnManager summary::-webkit-details-marker {
            display: none;
        }

        #columnManager summary:after {
            content: "";
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 5px 4px 0 4px;
            border-color: #333 transparent transparent transparent;
            margin-left: 16px;
            transition: transform 0.2s ease;
        }

        .toggle-column-manager {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .toggle-column-manager::before {
            content: "";
            display: inline-block;
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 8px solid #fff;
            transition: transform 0.2s ease;
        }

        .toggle-column-manager[aria-expanded="true"]::before {
            transform: rotate(90deg);
        }

        #columnManager details[open] summary:after {
            transform: rotate(90deg);
        }

        .group-items {
            padding: 10px 16px 14px;
        }

        .col-item {
            display: block;
            margin-bottom: 8px;
            margin-left: 24px;
        }

        .group-title label {
            margin-bottom: 0;
        }
    </style>

</head>

<body class="bg-light">

<div class="container-fluid mt-4">

    <!-- ================= HEADER CARD ================= -->
    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">ABRAPA Bale HVI Results</h3>
        </div>

        <div class="card-body">

            <ul class="nav nav-tabs mb-3" id="modeTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="single-tab" data-bs-toggle="tab" data-bs-target="#singleTab" type="button" role="tab" aria-controls="singleTab" aria-selected="true">Single Bale</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="upload-tab" data-bs-toggle="tab" data-bs-target="#uploadTab" type="button" role="tab" aria-controls="uploadTab" aria-selected="false">Upload</button>
                </li>
            </ul>

            <div class="tab-content" id="modeTabsContent">
                <div class="tab-pane fade show active" id="singleTab" role="tabpanel" aria-labelledby="single-tab">
                    <div class="card border-primary mb-4 shadow-sm">
                        <div class="card-body">
                            <label class="form-label">Bale Number</label>
                            <div class="input-group mb-3">
                                <input id="baleNumber" class="form-control" placeholder="Enter Bale Number">
                                <button id="searchBtn" class="btn btn-primary" type="button"><i class="bi bi-search"></i></button>
                            </div>
                        </div>
                    </div>

                    <div class="card mt-4 shadow">
                        <div class="card-header bg-dark text-white d-flex align-items-center justify-content-between">
                            <span>Column Manager</span>
                            <button id="toggleColumnManagerBtn" class="btn btn-sm btn-outline-light p-0 toggle-column-manager" aria-expanded="false" title="Show filters"></button>
                        </div>
                        <div class="card-body"><div id="columnManager" class="d-none"></div></div>
                    </div>

                    <div class="card mt-4 shadow">
                        <div class="card-header d-flex align-items-center justify-content-between">
                            <span>Results</span>
                            <button id="singleBaleExportBtn" class="btn btn-sm btn-outline-secondary" title="Download Excel" disabled>
                                <i class="bi bi-download"></i>
                            </button>
                        </div>
                        <div class="card-body"><div id="resultTable"></div></div>
                    </div>
                </div>
                <div class="tab-pane fade" id="uploadTab" role="tabpanel" aria-labelledby="upload-tab">
                    <div class="card border-secondary mb-4 shadow-sm">
                        <div class="card-body">
                            <div class="row g-3 align-items-end">
                                <div class="col-md-4">
                                    <button id="downloadTemplateBtn" class="btn btn-success w-100">Download Template</button>
                                </div>
                                <div class="col-md-4">
                                    <input id="uploadTemplateInput" type="file" class="form-control" accept=".csv,.xlsx,.xls">
                                </div>
                                <div class="col-md-4">
                                    <button id="uploadTemplateBtn" class="btn btn-warning w-100" disabled>Upload Template</button>
                                </div>
                            </div>

                            <!-- Progress Bar Section -->
                            <div id="progressContainer" class="mt-4 p-3 bg-info bg-opacity-10 border border-info border-opacity-25 rounded progress-container" style="display: none;">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="spinner-border spinner-border-sm text-info" role="status" aria-hidden="true"></span>
                                        <span class="fw-bold text-info">
                                            <i class="bi bi-hourglass-split"></i> Processing in Progress
                                        </span>
                                    </div>
                                    <span id="progressPercentage" class="badge bg-info">0%</span>
                                </div>
                                <div class="progress mb-3" style="height: 30px;">
                                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-info" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                                <div id="progressText" class="text-info small">
                                    <strong>Processed:</strong> <span id="progressCount">0</span> / <span id="progressTotal">0</span> bales
                                </div>
                            </div>

                            <!-- Upload Status -->
                            <div class="mt-3">
                                <div id="uploadStatus" class="text-muted"></div>
                            </div>

                            <!-- Downloads Section -->
                            <div id="downloadsSection" class="mt-4" style="display: none;">
                                <div class="d-flex align-items-center justify-content-between mb-3">
                                    <h5 class="mb-0">Download Results</h5>
                                    <button id="downloadAllBtn" class="btn btn-success btn-sm">Download All Parts</button>
                                </div>
                                <div id="downloadList" class="list-group"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

<!-- ================= SCRIPTS ================= -->

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>

<script src="js/columnManager.js"></script>
<script src="js/table.js"></script>
<script src="js/app.js"></script>

</body>
</html>
